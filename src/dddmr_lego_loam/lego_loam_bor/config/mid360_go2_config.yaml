# ================================================================
# LeGO-LOAM 配置 - 适配 Livox Mid-360 和 GO2 机器狗
# 在线模式（配合 ros2 bag play --clock 使用）
# ================================================================

lego_loam_ip:
  ros__parameters:
    use_sim_time: true                     # 使用仿真时间（bag播放时必须为true）

    laser:
        odom_type: "wheel_odometry"        # 激光里程计
        baselink_frame: "base_link"        # 机器人基坐标系（关键！）
        # base_ground_frame 不再需要，已删除
        num_vertical_scans: 32           # Mid-360 等效40线
        num_horizontal_scans: 1200         # 水平分辨率
        vertical_angle_bottom: -7.0       # 垂直下边界（度）
        vertical_angle_top: 52.0           # 垂直上边界（度）
        scan_period: 0.1                   # 10Hz

    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 2
        segment_theta: 60.0
        minimum_detection_range: 0.1
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 0.5
        stitcher_num: 3                    # 非重复扫描关键参数
        trt_model_path: ""
        projected_image_stack_size: 1
        # 地面分割角度（相对于水平面，单位弧度）
        ground_fov_bottom: -0.5236         # -30°
        ground_fov_top: -0.0873            # -5°
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926

lego_loam_fa:
  ros__parameters:
    use_sim_time: true
    featureAssociation:
        edge_threshold: 0.2
        surf_threshold: 0.2
        nearest_feature_search_distance: 3.0
    mapping:
        to_map_optimization: true

lego_loam_mo:
  ros__parameters:
    use_sim_time: true
    mapping:
        distance_between_key_frame: 1.0
        angle_between_key_frame: 1.0
        enable_loop_closure: true
        surrounding_keyframe_search_num: 20
        history_keyframe_search_radius: 12.0
        history_keyframe_search_num: 5
        history_keyframe_fitness_score: 0.5
        ground_voxel_size: 0.3

lego_loam_map_visualization:
  ros__parameters:
    use_sim_time: true                     # 改为 true！
    ground_voxel_size: 0.3
    ground_edge_threshold_num: 50